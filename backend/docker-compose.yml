services:
  db:
    image: postgres:15-alpine
    container_name: spruzhuk_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: spruzhuk
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  db-backup:
    image: prodrigestivill/postgres-backup-local
    container_name: spruzhuk_db_backup
    restart: always
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: spruzhuk
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rootpassword
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 120
    volumes:
      - ./db_backups:/backups
    depends_on:
      - db

  zookeeper:
    image: bitnami/zookeeper:latest
    container_name: spruzhuk_zookeeper
    restart: always
    environment:
      ALLOW_ANONYMOUS_LOGIN: "yes"

  kafka:
    image: bitnami/kafka:latest
    container_name: spruzhuk_kafka
    restart: always
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_CFG_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      ALLOW_PLAINTEXT_LISTENER: "yes"

  minio:
    image: minio/minio:latest
    container_name: spruzhuk_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: spruzhuk_minio_init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin}; do sleep 2; done;
      mc mb --ignore-existing local/${S3_BUCKET_NAME:-spruzhuk-media};
      mc anonymous set download local/${S3_BUCKET_NAME:-spruzhuk-media};
      "

  backend:
    build: .
    container_name: spruzhuk_backend
    restart: always
    depends_on:
      - db
      - kafka
      - minio
    env_file:
      - ./.env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-http://localhost:9000/spruzhuk-media}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-spruzhuk-media}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_REGION: ${S3_REGION:-ru-central1}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
    ports:
      - "8000:8000"

  app:
    build: ./react_hosting
    container_name: spruzhuk_app
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
  minio_data:
