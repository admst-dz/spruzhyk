version: '3.8'

services:
  db:
    image: public.ecr.aws/docker/library/postgres:15-alpine
    pull_policy: if_not_present
    container_name: spruzhuk_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - spruzhuk_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  zookeeper:
    image: public.ecr.aws/bitnami/zookeeper:3.9
    container_name: spruzhuk_zookeeper
    restart: unless-stopped
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
      - ZOO_HEAP_SIZE=256
    volumes:
      - zookeeper_data:/bitnami/zookeeper
    networks:
      - spruzhuk_net
    healthcheck:
      test: ["CMD", "zkServer.sh", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  kafka:
    image: public.ecr.aws/bitnami/kafka:3.6
    container_name: spruzhuk_kafka
    hostname: kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_HEAP_OPTS=-Xmx512m -Xms512m
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_CFG_DELETE_TOPIC_ENABLE=true
      - KAFKA_CFG_LOG_RETENTION_HOURS=168
      - KAFKA_CFG_LOG_RETENTION_BYTES=1073741824
      - KAFKA_CFG_LOG_SEGMENT_BYTES=107374182
      - KAFKA_CFG_NUM_PARTITIONS=3
      - KAFKA_CFG_DEFAULT_REPLICATION_FACTOR=1
      - KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR=1
    volumes:
      - kafka_data:/bitnami/kafka
    networks:
      - spruzhuk_net
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  backend:
    image: ghcr.io/admst-dz/spruzhyk-backend:latest
    pull_policy: always
    container_name: spruzhuk_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - spruzhuk_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    image: ghcr.io/admst-dz/spruzhyk-frontend:latest
    pull_policy: always
    container_name: spruzhuk_app
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - spruzhuk_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  frontend-render:
    image: ghcr.io/admst-dz/spruzhyk-frontend:latest
    pull_policy: always
    container_name: spruzhuk_app_render
    restart: unless-stopped
    networks:
      - spruzhuk_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/render/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  renderer:
    image: ghcr.io/admst-dz/spruzhyk-renderer:latest
    pull_policy: always
    container_name: spruzhuk_renderer
    restart: unless-stopped
    command:
      - /bin/sh
      - -lc
      - >
        node -e "const fs=require('fs'); const path='/app/package.json';
        const pkg=JSON.parse(fs.readFileSync(path,'utf8'));
        if (pkg.type !== 'module') { pkg.type = 'module'; fs.writeFileSync(path, JSON.stringify(pkg, null, 2)); }"
        && npm start
    environment:
      RENDER_FRONTEND_HOST: frontend-render
      RENDER_FRONTEND_PORT: 80
      RENDER_FRONTEND_PATH: /render/
    depends_on:
      frontend-render:
        condition: service_healthy
    networks:
      - spruzhuk_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  watchtower:
    image: containrrr/watchtower
    container_name: spruzhuk_watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=3600
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_INCLUDE_RESTARTING=true
    command: --label-enable --cleanup --interval 3600
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

networks:
  spruzhuk_net:
    driver: bridge
    name: spruzhyk_spruzhuk_net

volumes:
  postgres_data:
    name: spruzhyk_postgres_data
    driver: local
  zookeeper_data:
    name: spruzhyk_zookeeper_data
    driver: local
  kafka_data:
    name: spruzhyk_kafka_data
    driver: local