services:
  db:
    image: public.ecr.aws/docker/library/postgres:15-alpine
    pull_policy: if_not_present
    container_name: spruzhuk_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - spruzhuk_net

  backend:
    image: ghcr.io/admst-dz/spruzhyk-backend:latest
    pull_policy: always
    container_name: spruzhuk_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      - db
      - kafka
    networks:
      - spruzhuk_net

  frontend:
    image: ghcr.io/admst-dz/spruzhyk-frontend:latest
    pull_policy: always
    container_name: spruzhuk_app
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - spruzhuk_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend-render:
    image: ghcr.io/admst-dz/spruzhyk-frontend:latest
    pull_policy: always
    container_name: spruzhuk_app_render
    restart: unless-stopped
    networks:
      - spruzhuk_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/render/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  kafka:
    image: public.ecr.aws/bitnami/kafka:latest
    container_name: spruzhuk_kafka
    hostname: kafka
    restart: unless-stopped
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
    volumes:
      - kafka_data:/bitnami/kafka
    networks:
      - spruzhuk_net

  renderer:
    image: ghcr.io/admst-dz/spruzhyk-renderer:latest
    pull_policy: always
    container_name: spruzhuk_renderer
    restart: unless-stopped
    command:
      - /bin/sh
      - -lc
      - >
        node -e "const fs=require('fs'); const path='/app/package.json';
        const pkg=JSON.parse(fs.readFileSync(path,'utf8'));
        if (pkg.type !== 'module') { pkg.type = 'module'; fs.writeFileSync(path, JSON.stringify(pkg, null, 2)); }"
        && npm start
    environment:
      RENDER_FRONTEND_HOST: frontend-render
      RENDER_FRONTEND_PORT: 80
      RENDER_FRONTEND_PATH: /render/
    depends_on:
      frontend-render:
        condition: service_healthy
    networks:
      - spruzhuk_net

networks:
  spruzhuk_net:
    driver: bridge

volumes:
  postgres_data:
  kafka_data:
