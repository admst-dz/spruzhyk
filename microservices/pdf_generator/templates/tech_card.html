<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Технологическая карта</title>
    <style>
        body { font-family: sans-serif; color: #333; margin: 20px; }
        h1 { border-bottom: 2px solid #000; padding-bottom: 10px; }
        .info-table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
        .info-table th, .info-table td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        .info-table th { background-color: #f5f5f5; width: 40%; }
        .image-container img { max-width: 300px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <h1>Тех. Карта заказа #{{ order_id }}</h1>
    <table class="info-table">
        <tr><th>Клиент</th><td>{{ client_name }}</td></tr>
        <tr><th>Тираж</th><td>{{ quantity }} шт.</td></tr>
        <tr><th>Формат / Переплет</th><td>{{ format }} / {{ binding_type }}</td></tr>
        <tr><th>Цвет обложки</th><td>{{ cover_color }}</td></tr>
        <tr><th>Блок</th><td>{{ paper_pattern }}</td></tr>
    </table>

    {% if render_url %}
    <div class="image-container">
        <h3>Визуализация изделия:</h3>
        <img src="{{ render_url }}" alt="Render">
    </div>
    {% endif %}
</body>
</html>
