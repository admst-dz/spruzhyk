name: Deploy to Firebase Hosting

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Show Node / npm versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Show installed packages
        run: npm list --depth=0 || true

      - name: Build
        run: npm run build

      - name: Verify build output exists
        run: |
          if [ ! -d "dist" ]; then
            echo "ERROR: dist/ folder not found — build failed silently"
            exit 1
          fi
          echo "dist/ contents:"
          ls -lh dist/
          echo "dist/assets/ contents:"
          ls -lh dist/assets/ || echo "(no assets folder)"
          INDEX="dist/index.html"
          if [ ! -f "$INDEX" ]; then
            echo "ERROR: dist/index.html missing — build is broken"
            exit 1
          fi
          echo "index.html size: $(wc -c < $INDEX) bytes"

      - name: Check firebase.json exists
        run: |
          if [ ! -f "firebase.json" ]; then
            echo "ERROR: firebase.json not found"
            exit 1
          fi
          echo "firebase.json:"
          cat firebase.json

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting --project spruzhuk --token "$FIREBASE_TOKEN" --debug
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
