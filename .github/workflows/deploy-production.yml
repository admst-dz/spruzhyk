name: Deploy to Production

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'src/**'
              - 'Dockerfile'
              - 'nginx.conf'
              - 'package*.json'
              - 'vite.config.*'
              - 'index.html'
              - 'postcss.config.*'
              - 'tailwind.config.*'
              - 'eslint.config.*'
            backend:
              - 'spruzhyk_backend/**'

  build-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/admst-dz/spruzhyk-frontend:latest
          cache-from: type=registry,ref=ghcr.io/admst-dz/spruzhyk-frontend:cache
          cache-to: type=registry,ref=ghcr.io/admst-dz/spruzhyk-frontend:cache,mode=max

  build-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./spruzhyk_backend
          push: true
          tags: ghcr.io/admst-dz/spruzhyk-backend:latest
          cache-from: type=registry,ref=ghcr.io/admst-dz/spruzhyk-backend:cache
          cache-to: type=registry,ref=ghcr.io/admst-dz/spruzhyk-backend:cache,mode=max
