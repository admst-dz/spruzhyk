name: Deploy to Production (Docker)

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - closed
    branches:
      - main

jobs:
  deploy:
    if: github.event_name == 'push' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build frontend Docker image
        run: docker build -t spruzhyk-app:latest .

      - name: Build backend Docker image
        run: docker build -t spruzhyk-backend:latest ./spruzhyk_backend

      - name: Save Docker images to tar
        run: |
          docker save spruzhyk-app:latest | gzip > spruzhyk-app.tar.gz
          docker save spruzhyk-backend:latest | gzip > spruzhyk-backend.tar.gz

      - name: Copy images and compose to server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          password: ${{ secrets.PROD_SERVER_PASSWORD }}
          port: 22
          source: "spruzhyk-app.tar.gz,spruzhyk-backend.tar.gz,docker-compose.yml"
          target: /tmp/spruzhyk/

      - name: Deploy on server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          password: ${{ secrets.PROD_SERVER_PASSWORD }}
          port: 22
          script_stop: true
          script: |
            set -e

            docker load < /tmp/spruzhyk/spruzhyk-app.tar.gz
            docker load < /tmp/spruzhyk/spruzhyk-backend.tar.gz

            mkdir -p /opt/spruzhyk
            cp /tmp/spruzhyk/docker-compose.yml /opt/spruzhyk/docker-compose.yml

            # Убиваем старые контейнеры занимающие порт 80
            docker stop spruzhyk-app 2>/dev/null || true
            docker rm spruzhyk-app 2>/dev/null || true

            cd /opt/spruzhyk
            docker compose down --remove-orphans || true
            docker compose up -d

            rm -rf /tmp/spruzhyk
            docker image prune -f

            echo "Deployment successful!"
            docker compose ps
