name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "What to build"
        required: true
        default: "all"
        type: choice
        options: [all, frontend, backend, renderer, deploy-only]

permissions:
  contents: read
  packages: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.result.outputs.frontend }}
      backend: ${{ steps.result.outputs.backend }}
      renderer: ${{ steps.result.outputs.renderer }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'
            renderer:
              - 'microservices/renderer/**'

      - id: result
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TARGET="${{ inputs.target }}"
            echo "frontend=$([[ $TARGET == all || $TARGET == frontend ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"
            echo "backend=$([[ $TARGET == all || $TARGET == backend ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"
            echo "renderer=$([[ $TARGET == all || $TARGET == renderer ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          else
            echo "frontend=${{ steps.filter.outputs.frontend }}" >> "$GITHUB_OUTPUT"
            echo "backend=${{ steps.filter.outputs.backend }}" >> "$GITHUB_OUTPUT"
            echo "renderer=${{ steps.filter.outputs.renderer }}" >> "$GITHUB_OUTPUT"
          fi

  build-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ghcr.io/admst-dz/spruzhyk-frontend:latest
          build-args: |
            VITE_API_URL=/api/v1
          cache-from: type=registry,ref=ghcr.io/admst-dz/spruzhyk-frontend:cache
          cache-to: type=registry,ref=ghcr.io/admst-dz/spruzhyk-frontend:cache,mode=max

  build-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ghcr.io/admst-dz/spruzhyk-backend:latest
          cache-from: type=registry,ref=ghcr.io/admst-dz/spruzhyk-backend:cache
          cache-to: type=registry,ref=ghcr.io/admst-dz/spruzhyk-backend:cache,mode=max

  build-renderer:
    needs: changes
    if: needs.changes.outputs.renderer == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push renderer
        uses: docker/build-push-action@v6
        with:
          context: ./microservices/renderer
          file: ./microservices/renderer/Dockerfile
          push: true
          tags: ghcr.io/admst-dz/spruzhyk-renderer:latest
          cache-from: type=registry,ref=ghcr.io/admst-dz/spruzhyk-renderer:cache
          cache-to: type=registry,ref=ghcr.io/admst-dz/spruzhyk-renderer:cache,mode=max

  deploy:
    needs:
      - changes
      - build-frontend
      - build-backend
      - build-renderer
    if: >
      always() &&
      needs.changes.result == 'success' &&
      needs.build-frontend.result != 'failure' &&
      needs.build-backend.result != 'failure' &&
      needs.build-renderer.result != 'failure'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Encode compose file
        run: |
          echo "COMPOSE_B64=$(base64 -w0 docker-compose.prod.yml)" >> $GITHUB_ENV
          PROD_PATH="${{ secrets.PROD_PATH }}"
          echo "DEPLOY_PATH=${PROD_PATH//$'\n'/}" >> $GITHUB_ENV

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: 22
          envs: COMPOSE_B64,DEPLOY_PATH
          script: |
            set -euo pipefail
            export DOCKER_CLIENT_TIMEOUT=300
            export COMPOSE_HTTP_TIMEOUT=300

            retry() {
              local n=1
              local max=5
              local delay=15
              while true; do
                "$@" && break || {
                  if [ "$n" -lt "$max" ]; then
                    n=$((n + 1))
                    echo "Command failed. Retry $n/$max in ${delay}s: $*"
                    sleep "$delay"
                  else
                    echo "Command failed after $max attempts: $*"
                    return 1
                  fi
                }
              done
            }

            mkdir -p "$DEPLOY_PATH"
            echo "$COMPOSE_B64" | base64 -d > "$DEPLOY_PATH/docker-compose.prod.yml"
            cat > "$DEPLOY_PATH/.env" <<'EOF'
            ${{ secrets.PROD_ENV_FILE }}
            EOF
            cd "$DEPLOY_PATH"
            retry sh -c 'echo "${{ secrets.GHCR_READ_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin'
            docker compose -f docker-compose.prod.yml config -q
            retry docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
