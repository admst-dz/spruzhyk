server {
    listen 80;
    server_name _; # Принимает любые запросы

    # 1. Отдаем статику React
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Если роут не найден, отдаем index.html (ВАЖНО ДЛЯ REACT ROUTER)
        try_files $uri $uri/ /index.html;
    }

    # 2. Проксируем запросы на бэкенд
    location /api/ {
        # ВАЖНО: Слеш на конце порта 8000/ ОБЯЗАТЕЛЕН!
        # Он "отрезает" приставку /api/ перед тем как отдать запрос в FastAPI.
        # То есть фронт шлет /api/orders, а FastAPI получает просто /orders
        proxy_pass http://backend:8000/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}